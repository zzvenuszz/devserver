name: Sync to Hugging Face
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Debug Secret
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Kiểm tra độ dài của token để xác nhận nó không rỗng
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN is empty!"
            exit 1
          else
            echo "HF_TOKEN length is: ${#HF_TOKEN}"
          fi

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Đẩy code trực tiếp qua URL chứa Token
          git push https://noobsclan101:${HF_TOKEN}@huggingface.co/spaces/noobsclan101/devserver main --force