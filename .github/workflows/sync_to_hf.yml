name: Sync to Hugging Face

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Debug Secret
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN is empty!"
            exit 1
          else
            echo "HF_TOKEN length is: ${#HF_TOKEN}"
          fi

      - name: Push to multiple Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # ============================================================
          # NOTE:
          # Thêm Space mới bằng cách thêm 1 dòng vào mảng "targets"
          # theo định dạng:
          #
          #   "USERNAME OWNER/SPACE_NAME"
          #
          # Ví dụ:
          #   "noobsclan101 noobsclan101/devserver"
          #   "zzvenuszz zzvenuszz/testpaper"
          #   "myaccount myaccount/my-space"
          #
          # Lưu ý:
          # - USERNAME là tài khoản dùng để đăng nhập.
          # - OWNER/SPACE_NAME là đường dẫn đầy đủ của Space.
          # - HF_TOKEN phải có quyền ghi (Write) vào tất cả các Space.
          # ============================================================

          targets=(
            "noobsclan101 noobsclan101/devserver"
            "zzvenuszz zzvenuszz/testpaper"
          )

          for target in "${targets[@]}"; do
            read -r user repo <<< "$target"

            echo "========================================"
            echo "Syncing to: $repo"
            echo "Using account: $user"

            git push \
              "https://${user}:${HF_TOKEN}@huggingface.co/spaces/${repo}" \
              main --force

            echo "Done: $repo"
          done